name: Verify IIOS Foundation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify Invariant Kernel
        run: python scripts/verify_invariant_kernel.py
      - name: Verify Foundation
        run: python scripts/verify_foundation.py

  governance-tests:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff check)
        run: python -m ruff check src tests
      - name: Format check (ruff format)
        run: python -m ruff format --check src tests
      - name: Type check (mypy)
        run: python -m mypy src tests
      - name: Governance test suite (pytest + coverage)
        run: python -m pytest tests/governance --cov=iios_governance --cov-report=term-missing -q
